[agent]

; ════════════════════════════════════════════════════════
;  STEP 1 — Fill in your account details
;  Get these from: TallySync portal → Login → Sync page
; ════════════════════════════════════════════════════════

user_id = 2
api_key = 5bcc954acc9dd77cda006537bbbd16e3fd9b2889ee86774e52eaa5265865ef21
secret_key = 63d7107fc34a3324d283f8624a0f2b8c

; ════════════════════════════════════════════════════════
;  STEP 2 — Server URL
;  Keep as-is for localhost testing.
;  Change to your live domain when online, e.g:
;    server_url = https://tallysync.in/api/ingest.php
; ════════════════════════════════════════════════════════

server_url = http://localhost/tallysync/api/ingest.php

; ════════════════════════════════════════════════════════
;  STEP 3 — Tally connection
;  Keep as-is if Tally is on THIS same PC.
;  If Tally is on another PC on your network, use its IP:
;    tally_host = http://192.168.1.50:9000
; ════════════════════════════════════════════════════════

tally_host = http://localhost:9000

; ════════════════════════════════════════════════════════
;  Sync settings
; ════════════════════════════════════════════════════════

; How often Windows Task Scheduler runs the agent (minutes)
interval_min = 5

; How many days of vouchers to pull (365 = full year)
days_back = 365

; Months of vouchers per Tally request (keep 1 to avoid timeouts)
batch_months = 1

; Compress data before sending (gzip — always keep true, ~97% smaller)
compress = true

; Encryption: set false if your server runs PHP 5 (XAMPP default)
; PHP 5 does not support AES-256-GCM. Set true only if server runs PHP 7.1+
encrypt = false
