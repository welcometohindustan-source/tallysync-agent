name: Build TallySyncAgent.exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-windows-exe:
    runs-on: windows-latest   # real Windows machine in GitHub cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography

      - name: Build TallySyncAgent.exe
        run: |
          pyinstaller `
            --onefile `
            --console `
            --name TallySyncAgent `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.ciphers.aead `
            --hidden-import cryptography.hazmat.backends.openssl `
            --hidden-import cryptography.hazmat.bindings._rust `
            src/agent.py

      - name: Verify build
        run: |
          dir dist\
          echo "Build complete"

      - name: Upload TallySyncAgent.exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallySyncAgent-Windows
          path: |
            dist/TallySyncAgent.exe
            config.ini
            install.bat
            uninstall.bat
          retention-days: 30   # artifact available for 30 days to download
