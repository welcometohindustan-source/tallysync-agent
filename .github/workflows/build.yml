name: Build BizView Pro Agent + Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel to publish to. "beta" is safe for testing — the website download link always points at "latest" and is unaffected. Choose "latest" only after you have tested the beta build.'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine release channel
        id: channel
        shell: pwsh
        run: |
          # Pushes (including to main) always build to "beta" — safe, does not
          # touch the "latest" tag the website's download-agent.php serves.
          # Publishing to "latest" only happens via a manual "Run workflow"
          # with channel=latest explicitly selected.
          $ch = "${{ github.event.inputs.channel }}"
          if ([string]::IsNullOrEmpty($ch)) { $ch = "beta" }
          echo "channel=$ch" >> $env:GITHUB_OUTPUT
          Write-Host "Publishing to release channel: $ch"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller==6.11.1" "cryptography==43.0.3" "pystray==0.19.5" "pillow==10.4.0"

      - name: Create logo.ico from logo_icon.png
        run: python scripts/make_ico.py

      - name: Build BizViewProAgent.exe
        shell: pwsh
        run: |
          $pyArgs = @(
            "--onefile", "--windowed",
            "--name", "BizViewProAgent",
            "--hidden-import", "tkinter",
            "--hidden-import", "tkinter.ttk",
            "--hidden-import", "tkinter.messagebox",
            "--hidden-import", "tkinter.font",
            "--collect-all", "tkinter",
            "--hidden-import", "cryptography",
            "--hidden-import", "cryptography.hazmat.primitives.ciphers.aead",
            "--hidden-import", "cryptography.hazmat.backends.openssl",
            "--hidden-import", "cryptography.hazmat.primitives.kdf.pbkdf2",
            "--hidden-import", "pystray",
            "--hidden-import", "pystray._base",
            "--hidden-import", "pystray._win32",
            "--hidden-import", "PIL",
            "--hidden-import", "PIL.Image",
            "--hidden-import", "PIL.ImageDraw",
            "--hidden-import", "PIL.ImageTk",
            "--hidden-import", "PIL._tkinter_finder"
          )
          foreach ($logo in @("src/logo.ico","src/logo.png","src/logo_icon.png")) {
            if (Test-Path $logo) {
              $pyArgs += "--add-data"; $pyArgs += "${logo};."
              Write-Host "Embedding $logo"
            }
          }
          if (Test-Path "src/logo.ico") { $pyArgs += "--icon"; $pyArgs += "src/logo.ico" }
          $pyArgs += "src/agent_gui.py"
          python -m PyInstaller @pyArgs

      - name: Prepare installer staging
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force installer\dist | Out-Null
          Copy-Item dist\BizViewProAgent.exe installer\dist\BizViewProAgent.exe
          if (Test-Path config.ini) { Copy-Item config.ini installer\config.ini }
          foreach ($logo in @("src/logo.ico","src/logo.png","src/logo_icon.png")) {
            if (Test-Path $logo) { Copy-Item $logo installer\ }
          }

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $nsis = "C:\Program Files (x86)\NSIS\makensis.exe"
          $nsi  = "installer\TallySyncSetup.nsi"
          if (Test-Path "installer\logo.ico") { & $nsis "/DICON_FILE=logo.ico" $nsi }
          else { & $nsis $nsi }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Rename installer
        shell: pwsh
        run: |
          if (Test-Path "installer\TallySyncSetup.exe") {
            Rename-Item "installer\TallySyncSetup.exe" "BizViewProSetup.exe"
          } elseif (-not (Test-Path "installer\BizViewProSetup.exe")) {
            Write-Host "ERROR: no installer exe found"; dir installer\; exit 1
          }

      - name: Create installer.zip
        shell: pwsh
        run: |
          $items = @("installer\BizViewProSetup.exe")
          if (Test-Path config.ini) { $items += "config.ini" }
          Compress-Archive -Path $items -DestinationPath installer\BizViewProSetup.zip -Force

      # ── Auto-publish GitHub Release on every push ──────────────────────────
      - name: Generate version tag
        id: version
        shell: pwsh
        run: |
          $ts = Get-Date -Format "yyyy.MM.dd-HHmm"
          $sha = "${{ github.sha }}".Substring(0,7)
          echo "tag=v$ts-$sha" >> $env:GITHUB_OUTPUT
          echo "name=BizView Pro Agent $ts" >> $env:GITHUB_OUTPUT

      - name: Delete existing release and tag for this channel (if any)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ steps.channel.outputs.channel }}
        run: |
          gh release delete $env:CHANNEL --yes --cleanup-tag 2>$null
          git tag -d $env:CHANNEL 2>$null
          git push --delete origin $env:CHANNEL 2>$null
          exit 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.channel }}
          name: "BizView Pro Agent — ${{ steps.channel.outputs.channel == 'latest' && 'Latest (Live on Website)' || 'Beta (Testing Only)' }}"
          body: |
            ${{ steps.channel.outputs.channel == 'latest' && '**This is the LIVE build served by the website download link.**' || '**BETA build for testing — the website download link is unaffected by this release.** Download the assets below directly from this page to test.' }}

            ### Downloads
            | File | Description |
            |------|-------------|
            | `BizViewProSetup.zip` | **Recommended** — full Windows installer (double-click to install) |
            | `BizViewProAgent.exe` | Portable EXE — run directly, no install needed |

            Built from commit ${{ github.sha }} on ${{ github.ref_name }}
          prerelease: ${{ steps.channel.outputs.channel != 'latest' }}
          make_latest: ${{ steps.channel.outputs.channel == 'latest' }}
          fail_on_unmatched_files: false
          files: |
            installer/BizViewProSetup.zip
            dist/BizViewProAgent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (also kept for 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: BizViewProSetup-Installer-${{ steps.channel.outputs.channel }}
          path: installer/BizViewProSetup.zip
          retention-days: 30
