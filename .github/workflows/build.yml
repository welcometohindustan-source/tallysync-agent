name: Build TallySyncAgent + Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pystray pillow

      - name: Build TallySyncAgent.exe
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name TallySyncAgent `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.messagebox `
            --hidden-import cryptography `
            --hidden-import cryptography.hazmat.primitives.ciphers.aead `
            --hidden-import cryptography.hazmat.backends.openssl `
            --hidden-import cryptography.hazmat.bindings._rust `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            src/agent_gui.py

      - name: Verify EXE
        run: dir dist\

      - name: Copy files for installer
        run: |
          copy dist\TallySyncAgent.exe installer\TallySyncAgent.exe
          copy config.ini installer\config.ini

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Build NSIS Installer
        run: |
          cd installer
          # Create placeholder icon if not present
          if (!(Test-Path "icon.ico")) {
            Write-Host "No icon.ico — NSIS will use default"
            (Get-Content TallySyncSetup.nsi) -replace '!define MUI_ICON.*', '' `
              -replace '!define MUI_UNICON.*', '' | Set-Content TallySyncSetup.nsi
          }
          & "C:\Program Files (x86)\NSIS\makensis.exe" TallySyncSetup.nsi

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallySyncAgent-exe-only
          path: |
            dist/TallySyncAgent.exe
            config.ini
          retention-days: 30

      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TallySyncSetup-Installer
          path: installer/TallySyncSetup.exe
          retention-days: 30
